# See GitHub's docs for more information on this file:
# https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every weekday
      interval: "weekly"
    labels:
      - "dependency-upgrade"
    open-pull-requests-limit: 50

  # Maintain dependencies for Gradle modules
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      # Check for updates to Gradle modules every week
      interval: "weekly"
    labels:
      - "dependency-upgrade"
    open-pull-requests-limit: 50
    ignore:
      # logback-core is force-pinned in build.gradle to match logback-classic 1.3.12
      # (pinned by the Kestra platform BOM). Bumping it independently breaks the test
      # JVM (linkage failure surfacing as "AllurePostDiscoveryFilter could not be instantiated").
      - dependency-name: "ch.qos.logback:logback-core"
    groups:
      kestra-gradle-plugins:
        patterns:
          - "io.kestra.gradle.*"
